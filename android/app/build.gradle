plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.alok.poolmate"

    // ─────────────────────────────────────────────────────────────
    // compileSdk 36 = Android 16 (latest as of 2026)
    // ─────────────────────────────────────────────────────────────
    compileSdk 36

    // ─────────────────────────────────────────────────────────────
    // NDK r27b (27.2.12479018) — REQUIRED for 16 KB memory page
    // size support (Android 15+ compliance deadline May 2026).
    // Using flutter.ndkVersion is NOT sufficient — it may resolve
    // to an older NDK that produces 4 KB aligned .so files.
    // ─────────────────────────────────────────────────────────────
    ndkVersion "27.2.12479018"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.alok.poolmate"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode 51
        versionName "1.6.0"
        multiDexEnabled true

        // Vector drawable support
        vectorDrawables.useSupportLibrary = true

        // ─────────────────────────────────────────────────────────
        // ABI Filters — ensure 16 KB page-aligned .so files are
        // packaged for all supported ABIs. arm64-v8a is required
        // for Android 15 16 KB page size compliance.
        // ─────────────────────────────────────────────────────────
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists() &&
                keystoreProperties['keyAlias'] &&
                keystoreProperties['storeFile']) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            if (keystorePropertiesFile.exists() &&
                keystoreProperties['keyAlias'] &&
                keystoreProperties['storeFile']) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }

    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core-ktx:1.13.1'
            force 'androidx.core:core:1.13.1'
        }
    }

    // ─────────────────────────────────────────────────────────────
    // 16 KB Memory Page Size Support (Android 15 / API 35+)
    // useLegacyPackaging = false  → uses page-aligned zip packaging
    // This is REQUIRED alongside NDK r27b to pass Google Play's
    // 16 KB compatibility check (deadline: May 31, 2026).
    // ─────────────────────────────────────────────────────────────
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'io.card:android-sdk:5.5.1'

    // PlayCore for in-app review
    implementation "com.google.android.play:review:2.0.2"
    implementation "com.google.android.play:review-ktx:2.0.2"
}
