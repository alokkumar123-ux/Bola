name: poolmate
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+22

environment:
  sdk: '>=3.3.4 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  badges: ^3.1.2
  bottom_picker: ^3.2.0
  cached_network_image: ^3.4.1
  country_code_picker: ^3.3.0
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dotted_border: ^3.0.1
  firebase_app_check: ^0.3.2+6
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.6
  firebase_storage: ^12.4.6
  pointycastle: ^3.7.3

  flutter_easyloading: ^3.0.5
  flutter_html: any
  awesome_notifications: ^0.10.1
  flutter_paypal: ^0.2.1
  flutter_rating_bar: ^4.0.1
  flutter_stripe: ^11.5.0
  flutter_svg: ^2.1.0
  flutterflow_paginate_firestore: ^1.0.3+1
  flutter_cashfree_pg_sdk: ^2.2.9+47
  geocoding: ^3.0.0
  geoflutterfire2: ^2.3.15
  get: ^4.7.2
  google_maps_flutter: ^2.12.2
  google_maps_place_picker_mb: ^3.1.2
  google_sign_in: ^6.3.0
  googleapis_auth: ^2.0.0
  image_picker: ^1.1.2
  in_app_review: ^2.0.10
  intl: ^0.20.2
  location: ^8.0.0
  map_launcher: ^3.5.0
#  paytm_allinonesdk: ^1.2.6
  pin_code_fields: ^8.0.1
  provider: ^6.1.5
  razorpay_flutter: ^1.4.0
  rxdart: 0.27.7
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^7.0.1
  timelines_plus: ^1.0.6
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  paged_vertical_calendar: ^1.1.9
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  video_player: ^2.9.3
  get_thumbnail_video: ^0.7.3
  lottie:
  loading_animation_widget:
  asn1lib: ^1.6.5
  audioplayers: ^6.1.0
  flutter_ringtone_player: ^4.0.0+3

dependency_overrides:
  webview_flutter: ^4.7.0
  http: ^1.4.0
  geolocator: ^14.0.1
  cloud_firestore: ^5.6.8
  google_api_headers: ^4.5.0
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  fonts:
    - family: WixMadeforText-Bold
      fonts:
        - asset: assets/fonts/WixMadeforText-Bold.ttf

    - family: WixMadeforText-BoldItalic
      fonts:
        - asset: assets/fonts/WixMadeforText-BoldItalic.ttf

    - family: WixMadeforText-ExtraBold
      fonts:
        - asset: assets/fonts/WixMadeforText-ExtraBold.ttf

    - family: WixMadeforText-ExtraBoldItalic
      fonts:
        - asset: assets/fonts/WixMadeforText-ExtraBoldItalic.ttf

    - family: WixMadeforText-Italic
      fonts:
        - asset: assets/fonts/WixMadeforText-Italic.ttf

    - family: WixMadeforText-Medium
      fonts:
        - asset: assets/fonts/WixMadeforText-Medium.ttf

    - family: WixMadeforText-MediumItalic
      fonts:
        - asset: assets/fonts/WixMadeforText-MediumItalic.ttf

    - family: WixMadeforText-Regular
      fonts:
        - asset: assets/fonts/WixMadeforText-Regular.ttf

    - family: WixMadeforText-SemiBold
      fonts:
        - asset: assets/fonts/WixMadeforText-SemiBold.ttf

    - family: WixMadeforText-SemiBoldItalic
      fonts:
        - asset: assets/fonts/WixMadeforText-SemiBoldItalic.ttf
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/audio/
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
